<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>AR Bodenbelag Sorex</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer@3.5.0/dist/model-viewer.min.js"></script>

  <style>
    body { text-align: center; font-family: Arial, sans-serif; }
    h1 { margin-top: 20px; }

    #ar-button {
      display: inline-block;
      background-color: #007AFF;
      color: white;
      border: none;
      padding: 15px;
      font-size: 18px;
      cursor: pointer;
      border-radius: 8px;
      margin-top: 20px;
      text-decoration: none;
    }
  </style>
</head>

<body>
  <h1>Sorex Bodenbelag</h1>

  <model-viewer
    id="floor-model"
    ios-src="Sorex.usdz"
    ar
    ar-modes="quick-look"
    scale="1 1 1"
    style="width: 100%; height: 300px;">
  </model-viewer>

  <a id="ar-button" rel="ar" href="Sorex.usdz">
    📌 In AR anzeigen
  </a>

</body>
</html>
